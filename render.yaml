services:
  - type: web
    name: chatpdf-advanced
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: uploads-data
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
